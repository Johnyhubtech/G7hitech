<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>G7 Hitech Digital Solutions — World-Class Tech for Every Sector</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0A2472;--blue-mid:#1A3A8F;--blue-light:#2952CC;--blue-pale:#EEF2FF;
  --gold:#D4A017;--gold-light:#F0C040;--gold-pale:#FDF6E3;
  --white:#FFFFFF;--gray:#6B7280;--gray-light:#F3F4F6;--text:#111827;--border:#E5E7EB;
}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--white);color:var(--text);overflow-x:hidden}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 4vw;height:68px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo-mark{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--blue-light));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1rem;font-weight:800;color:var(--gold-light)}
.nav-logo-text{font-size:.95rem;font-weight:700;color:var(--blue)}
.nav-logo-text span{color:var(--gold)}
.nav-links{display:flex;gap:1.4rem;list-style:none}
.nav-links a{font-size:.8rem;font-weight:500;color:var(--gray);text-decoration:none;transition:color .2s;white-space:nowrap}
.nav-links a:hover,.nav-links a.active{color:var(--blue)}
.nav-right{display:flex;gap:.6rem;align-items:center}
.btn-nav-outline{border:1.5px solid var(--blue);color:var(--blue);background:transparent;padding:.4rem 1rem;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;text-decoration:none;transition:background .2s,color .2s;white-space:nowrap}
.btn-nav-outline:hover{background:var(--blue);color:var(--white)}
.btn-nav-solid{background:var(--gold);color:var(--blue);border:none;padding:.4rem 1.1rem;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none;transition:opacity .2s;white-space:nowrap}
.btn-nav-solid:hover{opacity:.88}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{display:block;width:22px;height:2px;background:var(--blue);border-radius:2px}
.mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;z-index:199;background:var(--white);border-bottom:1px solid var(--border);padding:1rem 4vw 1.5rem;max-height:calc(100vh - 68px);overflow-y:auto}
.mobile-menu a{display:block;padding:.65rem 0;color:var(--gray);font-size:.9rem;text-decoration:none;border-bottom:1px solid var(--border)}
.mobile-menu a:hover{color:var(--blue)}
.mobile-cta{margin-top:.75rem;display:flex;gap:.75rem;flex-wrap:wrap}

/* ── PAGES ── */
.page{display:none;padding-top:68px;min-height:100vh}
.page.active{display:block}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-mid) 55%,#0d3080 100%);min-height:calc(100vh - 68px);display:flex;align-items:center;padding:4rem 4vw;position:relative;overflow:hidden}
.hero-video-bg{position:absolute;inset:0;background:
  radial-gradient(ellipse at 20% 50%,rgba(41,82,204,0.3) 0%,transparent 60%),
  radial-gradient(ellipse at 80% 20%,rgba(212,160,23,0.15) 0%,transparent 50%),
  radial-gradient(ellipse at 60% 80%,rgba(10,36,114,0.4) 0%,transparent 60%);
  animation:heroBg 8s ease-in-out infinite alternate}
@keyframes heroBg{0%{opacity:.7}100%{opacity:1}}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}
.floating-shapes{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.shape{position:absolute;border-radius:50%;animation:float 6s ease-in-out infinite}
.shape-1{width:300px;height:300px;background:rgba(212,160,23,0.06);top:-10%;right:5%;animation-delay:0s}
.shape-2{width:200px;height:200px;background:rgba(41,82,204,0.12);bottom:10%;right:20%;animation-delay:2s}
.shape-3{width:150px;height:150px;background:rgba(212,160,23,0.08);top:40%;right:40%;animation-delay:4s}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(5deg)}}
.hero-inner{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;width:100%}
.hero-tag{display:inline-flex;align-items:center;gap:.5rem;background:rgba(212,160,23,0.15);border:1px solid rgba(212,160,23,0.35);color:var(--gold-light);font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .8rem;border-radius:20px;margin-bottom:1.25rem}
.hero-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold-light);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.6rem);font-weight:800;line-height:1.1;color:var(--white);margin-bottom:1.2rem;letter-spacing:-0.02em}
.hero h1 em{font-style:normal;color:var(--gold-light)}
.hero-sub{font-size:.95rem;color:rgba(255,255,255,.72);line-height:1.75;margin-bottom:2rem;max-width:480px}
.hero-btns{display:flex;gap:.85rem;flex-wrap:wrap}
.btn-gold{background:var(--gold);color:var(--blue);padding:.8rem 1.75rem;border-radius:8px;font-weight:700;font-size:.875rem;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:opacity .2s,transform .2s}
.btn-gold:hover{opacity:.88;transform:translateY(-2px)}
.btn-white-outline{background:transparent;color:var(--white);padding:.8rem 1.75rem;border-radius:8px;font-weight:600;font-size:.875rem;border:1.5px solid rgba(255,255,255,.3);cursor:pointer;text-decoration:none;display:inline-block;transition:all .2s}
.btn-white-outline:hover{border-color:var(--gold-light);color:var(--gold-light)}
.hero-stats{display:flex;gap:1.75rem;margin-top:2.5rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.12);flex-wrap:wrap}
.h-stat-val{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;color:var(--gold-light)}
.h-stat-label{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:.2rem}

/* Hero right - image collage */
.hero-visual{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:.75rem}
.hero-img-card{border-radius:14px;overflow:hidden;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;transition:transform .3s}
.hero-img-card:hover{transform:scale(1.02)}
.hero-img-card.tall{grid-row:span 2}
.hero-img-icon{font-size:clamp(2.5rem,5vw,4rem)}
.hero-img-label{font-size:.72rem;font-weight:600;color:rgba(255,255,255,.7);text-align:center;padding:0 .5rem}
.card-blue-grad{background:linear-gradient(135deg,rgba(41,82,204,0.4),rgba(10,36,114,0.6));padding:2rem 1rem;min-height:160px}
.card-gold-grad{background:linear-gradient(135deg,rgba(212,160,23,0.25),rgba(212,160,23,0.1));padding:1.5rem 1rem;min-height:120px}
.card-dark-grad{background:linear-gradient(135deg,rgba(0,0,0,0.3),rgba(10,36,114,0.5));padding:1.5rem 1rem;min-height:120px}
.card-green-grad{background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(5,150,105,0.15));padding:1.5rem 1rem;min-height:120px}

/* ── COUNTERS ── */
.counters-strip{background:var(--blue);padding:2.5rem 4vw;display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;text-align:center}
.counter-item{}
.counter-val{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:800;color:var(--gold-light)}
.counter-label{font-size:.78rem;color:rgba(255,255,255,.55);margin-top:.3rem}

/* ── SECTION BASE ── */
.sec{padding:5rem 4vw}
.sec-alt{background:var(--gray-light)}
.sec-blue{background:var(--blue);color:var(--white)}
.sec-blue-pale{background:var(--blue-pale)}
.eyebrow{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem}
.sec-blue .eyebrow{color:var(--gold-light)}
.sec-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,2.8vw,2.4rem);font-weight:800;letter-spacing:-0.02em;line-height:1.18;margin-bottom:.8rem}
.sec-sub{color:var(--gray);max-width:550px;line-height:1.75;font-size:.92rem}
.sec-blue .sec-sub{color:rgba(255,255,255,.62)}
.sec-head{margin-bottom:3rem}
.sec-head-row{display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap;margin-bottom:3rem}

/* ── CARDS ── */
.card-grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.25rem}
.card-grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1.1rem}
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.6rem;transition:box-shadow .25s,transform .25s,border-color .25s}
.card:hover{box-shadow:0 8px 28px rgba(10,36,114,.09);transform:translateY(-3px);border-color:var(--blue-light)}
.card-icon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;margin-bottom:1rem}
.icon-blue{background:var(--blue-pale)}
.icon-gold{background:var(--gold-pale)}
.card h3{font-size:.95rem;font-weight:700;margin-bottom:.45rem;color:var(--blue)}
.card p{font-size:.82rem;color:var(--gray);line-height:1.7}

/* ── SCROLL ANIMATIONS ── */
.fade-up{opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}
.fade-left{opacity:0;transform:translateX(-30px);transition:opacity .6s ease,transform .6s ease}
.fade-left.visible{opacity:1;transform:translateX(0)}
.fade-right{opacity:0;transform:translateX(30px);transition:opacity .6s ease,transform .6s ease}
.fade-right.visible{opacity:1;transform:translateX(0)}

/* ── TRUSTED BY (CLIENT LOGOS) ── */
.logos-strip{background:var(--gray-light);padding:2.5rem 4vw;overflow:hidden}
.logos-label{text-align:center;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:1.5rem}
.logos-track-wrap{overflow:hidden;position:relative}
.logos-track-wrap::before,.logos-track-wrap::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2}
.logos-track-wrap::before{left:0;background:linear-gradient(to right,var(--gray-light),transparent)}
.logos-track-wrap::after{right:0;background:linear-gradient(to left,var(--gray-light),transparent)}
.logos-track{display:flex;gap:2rem;animation:scroll-logos 28s linear infinite;width:max-content}
.logos-track:hover{animation-play-state:paused}
.logo-item{display:flex;align-items:center;gap:.6rem;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:.7rem 1.25rem;white-space:nowrap;font-size:.82rem;font-weight:700;color:var(--blue);min-width:150px;justify-content:center}
.logo-item span{font-size:1.2rem}
@keyframes scroll-logos{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── SERVICES ── */
.service-cat{border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1.5rem;background:var(--white);transition:box-shadow .2s}
.service-cat:hover{box-shadow:0 6px 24px rgba(10,36,114,.07)}
.service-cat-head{display:flex;align-items:flex-start;gap:1.1rem;margin-bottom:1.5rem}
.service-cat-icon{width:52px;height:52px;min-width:52px;border-radius:13px;background:var(--blue-pale);display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.service-cat-icon.gold{background:var(--gold-pale)}
.service-cat h3{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--blue);margin-bottom:.3rem}
.cat-sub{font-size:.82rem;color:var(--gray);line-height:1.65}
.service-list{display:flex;flex-wrap:wrap;gap:.55rem}
.service-tag{background:var(--blue-pale);color:var(--blue);border-radius:6px;padding:.3rem .75rem;font-size:.77rem;font-weight:600}
.service-tag.gold-tag{background:var(--gold-pale);color:#7a5800}

/* ── SECTORS ── */
.sectors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1rem}
.sector-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:13px;padding:1.4rem 1.1rem;text-align:center;transition:background .25s,border-color .25s,transform .25s}
.sector-card:hover{background:rgba(212,160,23,0.12);border-color:rgba(212,160,23,.4);transform:translateY(-3px)}
.sector-card .s-icon{font-size:1.9rem;margin-bottom:.65rem}
.sector-card h4{font-size:.85rem;font-weight:700;color:var(--white);margin-bottom:.3rem}
.sector-card p{font-size:.74rem;color:rgba(255,255,255,.5);line-height:1.6}

/* ── PORTFOLIO ── */
.portfolio-tabs{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2rem}
.p-tab{padding:.4rem 1rem;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:600;color:var(--gray);cursor:pointer;transition:all .2s}
.p-tab.active,.p-tab:hover{background:var(--blue);color:var(--white);border-color:var(--blue)}
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem}
.portfolio-item{border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--gray-light);transition:transform .25s,box-shadow .25s;cursor:pointer}
.portfolio-item:hover{transform:translateY(-4px);box-shadow:0 12px 35px rgba(10,36,114,.14)}
.portfolio-thumb{height:200px;display:flex;align-items:center;justify-content:center;font-size:4.5rem;position:relative;overflow:hidden}
.port-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(10,36,114,.9),rgba(41,82,204,.85));opacity:0;transition:opacity .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;color:var(--white)}
.port-overlay span{font-size:.85rem;font-weight:600}
.portfolio-item:hover .port-overlay{opacity:1}
.portfolio-info{padding:1.1rem}
.portfolio-info h4{font-size:.9rem;font-weight:700;color:var(--blue);margin-bottom:.3rem}
.portfolio-info p{font-size:.78rem;color:var(--gray);line-height:1.6}
.p-badge{display:inline-block;font-size:.68rem;font-weight:600;padding:.2rem .6rem;border-radius:10px;margin-bottom:.5rem}
.p-badge.blue{background:var(--blue-pale);color:var(--blue)}
.p-badge.gold{background:var(--gold-pale);color:#7a5800}
.p-badge.green{background:#d1fae5;color:#065f46}

/* ── TESTIMONIALS ── */
.testimonials-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem}
.testimonial-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.75rem;transition:box-shadow .25s,transform .25s}
.testimonial-card:hover{box-shadow:0 8px 28px rgba(10,36,114,.09);transform:translateY(-3px)}
.stars{color:var(--gold);font-size:1rem;margin-bottom:.85rem;letter-spacing:2px}
.testimonial-text{font-size:.875rem;color:var(--gray);line-height:1.75;font-style:italic;margin-bottom:1.25rem;position:relative}
.testimonial-text::before{content:'"';font-family:'Playfair Display',serif;font-size:3rem;color:var(--blue-pale);position:absolute;top:-1rem;left:-0.5rem;line-height:1}
.testimonial-author{display:flex;align-items:center;gap:.75rem}
.author-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.author-name{font-size:.85rem;font-weight:700;color:var(--text)}
.author-role{font-size:.75rem;color:var(--gray)}

/* ── TEAM ── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.25rem}
.team-card{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:box-shadow .25s,transform .25s;text-align:center}
.team-card:hover{box-shadow:0 8px 28px rgba(10,36,114,.1);transform:translateY(-4px)}
.team-avatar{height:130px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:linear-gradient(135deg,var(--blue-pale),#C7D2FE)}
.team-info{padding:1.1rem}
.team-info h4{font-size:.9rem;font-weight:700;color:var(--blue);margin-bottom:.2rem}
.team-role{font-size:.75rem;color:var(--gray);margin-bottom:.6rem}
.team-socials{display:flex;justify-content:center;gap:.5rem}
.social-btn{width:28px;height:28px;border-radius:6px;background:var(--blue-pale);display:flex;align-items:center;justify-content:center;font-size:.75rem;text-decoration:none;transition:background .2s}
.social-btn:hover{background:var(--blue)}

/* ── PRICING ── */
.pricing-cats{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2rem}
.pc-btn{padding:.4rem 1rem;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:600;color:var(--gray);cursor:pointer;transition:all .2s}
.pc-btn.active,.pc-btn:hover{background:var(--blue);color:var(--white);border-color:var(--blue)}
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.4rem}
.price-card{border:1.5px solid var(--border);border-radius:16px;padding:1.85rem;background:var(--white);position:relative;transition:box-shadow .25s,border-color .25s}
.price-card:hover{box-shadow:0 8px 28px rgba(10,36,114,.1);border-color:var(--blue-light)}
.price-card.featured{border-color:var(--blue);background:var(--blue);color:var(--white)}
.price-card.featured h3,.price-card.featured .p-amount,.price-card.featured .p-period,.price-card.featured .p-desc{color:var(--white)}
.price-card.featured .p-feat{color:rgba(255,255,255,.78);border-color:rgba(255,255,255,.15)}
.price-card.featured .p-feat::before{color:var(--gold-light)}
.feat-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--blue);font-size:.68rem;font-weight:700;padding:.22rem .8rem;border-radius:20px;white-space:nowrap}
.price-card h3{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--blue);margin-bottom:.35rem}
.p-desc{font-size:.8rem;color:var(--gray);margin-bottom:1.4rem;min-height:36px}
.p-amount{font-family:'Playfair Display',serif;font-size:2rem;font-weight:800;color:var(--blue);line-height:1}
.p-currency{font-size:1rem;vertical-align:super}
.p-period{font-size:.75rem;color:var(--gray);margin-top:.25rem;margin-bottom:1.4rem}
.p-features{list-style:none;margin-bottom:1.6rem}
.p-feat{font-size:.8rem;color:var(--gray);padding:.5rem 0;border-bottom:1px solid var(--border);display:flex;gap:.55rem;align-items:flex-start}
.p-feat::before{content:'✓';color:var(--blue);font-weight:700;flex-shrink:0}
.p-feat.no::before{content:'✕';color:#D1D5DB}
.p-feat.no{opacity:.45}
.btn-price-gold{width:100%;padding:.75rem;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;border:none;background:var(--gold);color:var(--blue);transition:opacity .2s}
.btn-price-gold:hover{opacity:.88}
.btn-price-outline{width:100%;padding:.75rem;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;background:transparent;border:1.5px solid var(--blue);color:var(--blue);transition:all .2s}
.btn-price-outline:hover{background:var(--blue);color:var(--white)}
.pricing-note{text-align:center;margin-top:1.5rem;font-size:.8rem;color:var(--gray)}

/* ── ABOUT ── */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:3.5rem;align-items:center}
.about-text p{color:var(--gray);line-height:1.8;font-size:.9rem;margin-bottom:1rem}
.value-list{list-style:none;margin-top:1.5rem}
.value-list li{display:flex;gap:1rem;align-items:flex-start;padding:.9rem 0;border-bottom:1px solid var(-
